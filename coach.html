<main class="container my-5">
    <h1 class="mb-4">Coach</h1>

    <form id="coachForm" class="mb-4">
      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="coachId">ID</label>
          <input type="text" name="id" class="form-control" id="coachId" placeholder="ID" required>
        </div>
        <div class="form-group col-md-6">
          <label for="coachName">Name</label>
          <input type="text" name="name" class="form-control" id="coachName" placeholder="Name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="coachDob">Date of Birth</label>
        <input type="date" name="date" class="form-control" id="coachDob" required>
      </div>
      <div class="form-group">
        <label for="coachExperience">Experience</label>
        <input type="text" name="experience" class="form-control" id="coachExperience" placeholder="Experience" required>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <span id="saveMsg" class="ml-3 text-success" style="display:none;">Saved!</span>
    </form>

    <h2 class="h4">Saved Coaches</h2>
    <div class="table-responsive">
      <table class="table table-bordered" id="coachesTable">
        <thead class="thead-light">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date of Birth</th>
            <th>Experience</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

<script>
    const form = document.getElementById('coachForm');
    const tableBody = document.querySelector('#coachesTable tbody');
    const saveMsg = document.getElementById('saveMsg');

    function loadCoaches() {
      const coaches = JSON.parse(localStorage.getItem('coaches') || '[]');
      tableBody.innerHTML = '';
      coaches.forEach(c => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${c.id}</td><td>${c.name}</td><td>${c.date}</td><td>${c.experience}</td>`;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const coach = {
        id: document.getElementById('coachId').value.trim(),
        name: document.getElementById('coachName').value.trim(),
        date: document.getElementById('coachDob').value,
        experience: document.getElementById('coachExperience').value.trim()
      };

      const coaches = JSON.parse(localStorage.getItem('coaches') || '[]');
      coaches.push(coach);
      localStorage.setItem('coaches', JSON.stringify(coaches));

      saveMsg.style.display = 'inline';
      setTimeout(() => (saveMsg.style.display = 'none'), 1400);

      form.reset();
      loadCoaches();
    });

    loadCoaches();
  </script>
</body>
