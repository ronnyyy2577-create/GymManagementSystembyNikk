<body>

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">

    <ul class="navbar-nav">
      <li class="nav-item active">
        <a class="nav-link" href="#">Gym Management System</a>

<main class="container my-5">
    <h1 class="mb-4">Membership</h1>

    <form id="membershipForm" class="mb-4">
      <div class="form-group">
        <label for="memberSelect">Select Member</label>
        <select class="form-control" id="memberSelect" required>
          <option value="">Choose a member...</option>
        </select>
      </div>
      <div class="form-group">
        <label for="packageType">Package Type</label>
        <select class="form-control" id="packageType" required>
          <option value="3">3 Months</option>
          <option value="6">6 Months</option>
          <option value="12">12 Months</option>
        </select>
      </div>
      <div class="form-group">
        <label for="startDate">Start Date</label>
        <input type="date" class="form-control" id="startDate" required>
      </div>
      <button type="submit" class="btn btn-primary">Save Membership</button>
      <span id="saveMsg" class="ml-3 text-success" style="display:none;">Saved!</span>
    </form>

    <h2 class="h4">Memberships</h2>
    <div class="table-responsive">
      <table class="table table-bordered" id="membershipsTable">
        <thead class="thead-light">
          <tr>
            <th>Member ID</th>
            <th>Member Name</th>
            <th>Package</th>
            <th>Start Date</th>
            <th>Expiry Date</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

<script>
    const form = document.getElementById('membershipForm');
    const memberSelect = document.getElementById('memberSelect');
    const tableBody = document.querySelector('#membershipsTable tbody');
    const saveMsg = document.getElementById('saveMsg');

    function loadMembers() {
      const members = JSON.parse(localStorage.getItem('members') || '[]');
      memberSelect.innerHTML = '<option value="">Choose a member...</option>';
      members.forEach(m => {
        const option = document.createElement('option');
        option.value = m.id;
        option.textContent = `${m.id} - ${m.name}`;
        memberSelect.appendChild(option);
      });
    }

    function calculateExpiry(startDate, months) {
      const date = new Date(startDate);
      date.setMonth(date.getMonth() + parseInt(months));
      return date.toISOString().split('T')[0];
    }

    function loadMemberships() {
      const memberships = JSON.parse(localStorage.getItem('memberships') || '[]');
      const members = JSON.parse(localStorage.getItem('members') || '[]');
      const memberMap = {};
      members.forEach(m => memberMap[m.id] = m.name);

      tableBody.innerHTML = '';
      memberships.forEach(mem => {
        const expiry = new Date(mem.expiry);
        const today = new Date();
        const status = expiry < today ? 'Expired' : 'Active';
        const row = document.createElement('tr');
        row.innerHTML = `<td>${mem.memberId}</td><td>${memberMap[mem.memberId] || 'Unknown'}</td><td>${mem.package} Months</td><td>${mem.start}</td><td>${mem.expiry}</td><td class="${status === 'Expired' ? 'text-danger' : 'text-success'}">${status}</td>`;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const membership = {
        memberId: document.getElementById('memberSelect').value,
        package: document.getElementById('packageType').value,
        start: document.getElementById('startDate').value,
        expiry: calculateExpiry(document.getElementById('startDate').value, document.getElementById('packageType').value)
      };

      const memberships = JSON.parse(localStorage.getItem('memberships') || '[]');
      memberships.push(membership);
      localStorage.setItem('memberships', JSON.stringify(memberships));

      saveMsg.style.display = 'inline';
      setTimeout(() => (saveMsg.style.display = 'none'), 1400);

      form.reset();
      loadMemberships();
    });

    loadMembers();
    loadMemberships();
  </script>
</body>
</html>
