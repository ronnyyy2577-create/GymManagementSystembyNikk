<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Fitness Forge</title>
    <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.ico">
    <style>
        img{width: 100%;}
        .login {height: 1000px; width: 100%; background: radial-gradient(#653d84, #332042); position: relative;}
        .login_box {width: 1050px; height: 600px; position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); background: #fff; border-radius: 10px; box-shadow: 1px 4px 22px -8px #0004; display: flex; overflow: hidden;}
        .login_box .left{width: 41%; height: 100%; padding: 25px 25px;}
        .login_box .right{width: 59%; height: 100%  }
        .left .top_link a {color: #452A5A; font-weight: 700;}
        .left .top_link{height: 20px}
        .left .contact{display: flex; align-items: center; justify-content: center; align-self: center; height: 100%; width: 73%; margin: auto;}
        .left h3{ text-align: center; margin-bottom: 40px; font-weight: bold; }
        .left input {border: none; width: 80%; margin: 15px 0px; border-bottom: 1px solid #4f30677d; padding: 7px 9px; width: 100%; overflow: hidden; background: transparent; font-weight: 700; font-size: 14px;}
        .left{background: linear-gradient(-45deg, #dcd7e0, #fff);}
        .submit {border: none; padding: 15px 70px; border-radius: 8px; display: block; margin: auto; margin-top: 120px; background: #583672; color: #fff; font-weight: 700; -webkit-box-shadow: 0px 9px 15px -11px rgba(88,54,114,1); -moz-box-shadow: 0px 9px 15px -11px rgba(88,54,114,1); box-shadow: 0px 9px 15px -11px rgba(88,54,114,1);}
        .right {background: linear-gradient(212.38deg, rgba(2,2,2, 0.7) 0%, rgba(175, 70, 189, 0.71) 100%),url('img/gallery5.png'); color: #fff; position: relative;}
        .right .right-text{height: 100%; position: relative; transform: translate(0%, 45%);}
        .right-text h2{display: block; width: 100%; text-align: center; font-size: 50px; font-weight: 700;}
        .right-text h5{display: block; width: 100%; text-align: center; font-size: 19px; font-weight: 700;}
        .right .right-inductor{position: absolute; width: 70px; height: 7px; background: #fff0; left: 50%; bottom: 70px; transform: translate(-50%, 0%);}
        .top_link img {width: 28px; padding-right: 7px; margin-top: -3px;}
        .error {color: #d20; text-align: center; margin-top: 15px; font-weight: 700;}
    </style>
</head>
<body>
    <section class="login">
        <div class="login_box">
            <div class="left">
                <div class="top_link"><a href="index.html"><img src="TT.png" alt="">Return home</a></div>
                <div class="contact">
                    <form id="loginForm">
                        <h3>SIGN IN</h3>
                        <input id="username" type="text" placeholder="USERNAME" required>
                        <input id="password" type="password" placeholder="PASSWORD" required>
                        <button type="submit" class="submit">LET'S GO</button>
                        <div id="errorMsg" class="error" role="alert" aria-live="polite" style="display:none;"></div>
                    </form>
                </div>

                <script>
                    document.getElementById('loginForm').addEventListener('submit', function(e) {
                        e.preventDefault();
                        const username = document.getElementById('username').value;
                        const password = document.getElementById('password').value;
                        const errorMsg = document.getElementById('errorMsg');

                        if (username === 'admin' && password === 'password') {
                            // Successful login
                            localStorage.setItem('adminLoggedIn', 'true');
                            window.location.href = 'admin-dashboard.html';
                        } else {
                            // Failed login
                            errorMsg.textContent = '❌ Username or Password is incorrect!';
                            errorMsg.style.display = 'block';
                            document.getElementById('password').value = '';
                        }
                    });
                </script>
            </div>
            <div class="right">
                <div class="right-text">
                    <h2>Fitness Forge</h2>
                    <h5>GYM MANAGEMENT SYSTEM</h5>
                </div>
                <div class="right-inductor"><img src="TT.png" alt=""></div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function (event) {
            event.preventDefault();
            var user = document.getElementById('username').value.trim();
            var pass = document.getElementById('password').value.trim();
            var error = document.getElementById('errorMsg');

            if (user === 'admin' && pass === 'password') {
                window.location.href = 'billing.html';
                return;
            }

            error.textContent = 'Username or Password is incorrect!';
            error.style.display = 'block';
        });
    </script>
</body>
</html>
