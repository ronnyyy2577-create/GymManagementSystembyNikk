<head>

  <link rel="shortcut icon" type="image/x-icon" href="assets/img/favicon.ico">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
  <style>
    body {
      background: radial-gradient(#653d84, #332042);
      color: #fff;
      font-weight: bold;
    }
    .navbar, .table, .form-control, .btn, h1, h2, label {
      font-weight: bold;
    }
    .table th, .table td {
      color: #000;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" href="admin-dashboard.html"><img src="img/TT.png" alt="Logo" style="height: 40px;"> Admin Panel</a>
    <div class="collapse navbar-collapse ml-auto">
      <ul class="navbar-nav ml-auto">
        <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="members.html">Members</a></li>
        <li class="nav-item"><a class="nav-link" href="coach.html">Coach</a></li>
        <li class="nav-item"><a class="nav-link active" href="billing.html">Billing</a></li>
        <li class="nav-item"><a class="nav-link" href="attendance.php">Attendance</a></li>
        <li class="nav-item"><a class="nav-link" href="receptionist.html">Receptionist</a></li>
        <li class="nav-item"><a class="nav-link" href="admin-login.html" style="color: #d32f2f; font-weight: 600;">Logout</a></li>
      </ul>
    </div>
  </nav>

  <main class="container my-5">
    <h1 class="mb-4">Billing</h1>

    <form id="billingForm" class="mb-4">
      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="memberId">Member ID</label>
          <input type="text" name="id" class="form-control" id="memberId" placeholder="ID" required>
        </div>
        <div class="form-group col-md-6">
          <label for="memberName">Member Name</label>
          <input type="text" name="name" class="form-control" id="memberName" placeholder="Name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="billingDate">Billing Date</label>
        <input type="date" name="date" class="form-control" id="billingDate" required>
      </div>
      <div class="form-group">
        <label for="amount">Amount</label>
        <input type="number" name="amount" class="form-control" id="amount" placeholder="Amount" required>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <span id="saveMsg" class="ml-3 text-success" style="display:none;">Saved!</span>
    </form>

    <h2 class="h4">Saved Bills</h2>
    <div class="table-responsive">
      <table class="table table-bordered" id="billsTable">
        <thead class="thead-light">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date</th>
            <th>Amount</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <script>
    const form = document.getElementById('billingForm');
    const tableBody = document.querySelector('#billsTable tbody');
    const saveMsg = document.getElementById('saveMsg');

    function loadBills() {
      const bills = JSON.parse(localStorage.getItem('bills') || '[]');
      tableBody.innerHTML = '';
      bills.forEach(b => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${b.id}</td><td>${b.name}</td><td>${b.date}</td><td>${b.amount}</td>`;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const bill = {
        id: document.getElementById('memberId').value.trim(),
        name: document.getElementById('memberName').value.trim(),
        date: document.getElementById('billingDate').value,
        amount: document.getElementById('amount').value.trim()
      };

      const bills = JSON.parse(localStorage.getItem('bills') || '[]');
      bills.push(bill);
      localStorage.setItem('bills', JSON.stringify(bills));

      saveMsg.style.display = 'inline';
      setTimeout(() => (saveMsg.style.display = 'none'), 1400);

      form.reset();
      loadBills();
    });

    loadBills();
  </script>
</body>
</html>
