<main class="container my-5">
    <h1 class="mb-4">Receptionist</h1>

    <form id="receptionistForm" class="mb-4">
      <div class="form-row">
        <div class="form-group col-md-6">
          <label for="receptionistId">ID</label>
          <input type="text" name="id" class="form-control" id="receptionistId" placeholder="ID" required>
        </div>
        <div class="form-group col-md-6">
          <label for="receptionistName">Name</label>
          <input type="text" name="name" class="form-control" id="receptionistName" placeholder="Name" required>
        </div>
      </div>
      <div class="form-group">
        <label for="receptionistDob">Date of Birth</label>
        <input type="date" name="date" class="form-control" id="receptionistDob" required>
      </div>
      <div class="form-group">
        <label for="receptionistAddress">Address</label>
        <input type="text" name="address" class="form-control" id="receptionistAddress" placeholder="Address" required>
      </div>
      <div class="form-group">
        <label for="receptionistPhone">Phone</label>
        <input type="text" name="phone" class="form-control" id="receptionistPhone" placeholder="Phone" required>
      </div>
      <button type="submit" class="btn btn-primary">Save</button>
      <span id="saveMsg" class="ml-3 text-success" style="display:none;">Saved!</span>
    </form>

    <h2 class="h4">Saved Receptionists</h2>
    <div class="table-responsive">
      <table class="table table-bordered" id="receptionistsTable">
        <thead class="thead-light">
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Date of Birth</th>
            <th>Address</th>
            <th>Phone</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js" integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js" integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl" crossorigin="anonymous"></script>

<script>
    const form = document.getElementById('receptionistForm');
    const tableBody = document.querySelector('#receptionistsTable tbody');
    const saveMsg = document.getElementById('saveMsg');

    function loadReceptionists() {
      const receptionists = JSON.parse(localStorage.getItem('receptionists') || '[]');
      tableBody.innerHTML = '';
      receptionists.forEach(r => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${r.id}</td><td>${r.name}</td><td>${r.date}</td><td>${r.address}</td><td>${r.phone}</td>`;
        tableBody.appendChild(row);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const receptionist = {
        id: document.getElementById('receptionistId').value.trim(),
        name: document.getElementById('receptionistName').value.trim(),
        date: document.getElementById('receptionistDob').value,
        address: document.getElementById('receptionistAddress').value.trim(),
        phone: document.getElementById('receptionistPhone').value.trim()
      };

      const receptionists = JSON.parse(localStorage.getItem('receptionists') || '[]');
      receptionists.push(receptionist);
      localStorage.setItem('receptionists', JSON.stringify(receptionists));

      saveMsg.style.display = 'inline';
      setTimeout(() => (saveMsg.style.display = 'none'), 1400);

      form.reset();
      loadReceptionists();
    });

    loadReceptionists();
  </script>
</body>
