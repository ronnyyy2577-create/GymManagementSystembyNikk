<div class="container">
    <h1 class="mb-4" style="color: #583672; font-weight: bold;">Manage Members</h1>

    <div id="successMsg" class="success-msg" style="display:none;"></div>

    <div class="form-section">
        <h3 style="color: #583672;">Add New Member</h3>
        <form id="memberForm">
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="memberId">Member ID *</label>
                    <input type="text" class="form-control" id="memberId" placeholder="e.g., M001" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="memberName">Name *</label>
                    <input type="text" class="form-control" id="memberName" placeholder="Full Name" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="memberDate">Date of Joining *</label>
                    <input type="date" class="form-control" id="memberDate" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="memberDob">Date of Birth *</label>
                    <input type="date" class="form-control" id="memberDob" required>
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="memberPhone">Phone *</label>
                    <input type="tel" class="form-control" id="memberPhone" placeholder="+91 XXXXXXXXXX" required>
                </div>
                <div class="form-group col-md-6">
                    <label for="memberCoach">Assigned Coach</label>
                    <input type="text" class="form-control" id="memberCoach" placeholder="Coach Name">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label for="memberCode">4-Digit Member Code *</label>
                    <input type="text" class="form-control" id="memberCode" placeholder="e.g., 1234" maxlength="4" pattern="\d{4}" title="Please enter exactly 4 digits" required>
                </div>
            </div>
            <button type="submit" class="submit-btn">Add Member</button>
        </form>
    </div>

    <div class="form-section">
        <h3 style="color: #583672;">Members List</h3>
        <div id="membersList" style="max-height: 400px; overflow-y: auto;">
            <p style="color: #999; text-align: center;">No members found. Add your first member above!</p>
        </div>
    </div>
</div>

<!-- Footer -->
<footer style="margin-top: 50px; padding: 20px; background-color: #f8f9fa; text-align: center; color: #666;">

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"></script>

<script>
// Display members in the list
function displayMembers() {
    const members = JSON.parse(localStorage.getItem('gymMembers') || '[]');
    const membersList = document.getElementById('membersList');
    
    if (members.length === 0) {
        membersList.innerHTML = '<p style="color: #999; text-align: center;">No members found. Add your first member above!</p>';
        return;
    }
    
    let html = '<table class="table table-hover" style="background: white;"><thead style="background-color: #583672; color: white;"><tr><th>ID</th><th>Name</th><th>Phone</th><th>Code</th><th>Coach</th><th>Action</th></tr></thead><tbody>';
    
    members.forEach((member, index) => {
        html += `<tr>
            <td>${member.id}</td>
            <td>${member.name}</td>
            <td>${member.phone}</td>
            <td><strong style="font-size: 16px; color: #583672;">${member.code}</strong></td>
            <td>${member.coach || '-'}</td>
            <td><button type="button" class="btn btn-sm btn-danger" onclick="deleteMember(${index})">Delete</button></td>
        </tr>`;
    });
    
    html += '</tbody></table>';
    membersList.innerHTML = html;
}

// Delete member function
function deleteMember(index) {
    if (confirm('Are you sure you want to delete this member?')) {
        let members = JSON.parse(localStorage.getItem('gymMembers') || '[]');
        members.splice(index, 1);
        localStorage.setItem('gymMembers', JSON.stringify(members));
        displayMembers();
    }
}

// Handle form submission
document.getElementById('memberForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    // Get form values
    const member = {
        id: document.getElementById('memberId').value.trim(),
        name: document.getElementById('memberName').value.trim(),
        date: document.getElementById('memberDate').value,
        dob: document.getElementById('memberDob').value,
        phone: document.getElementById('memberPhone').value.trim(),
        coach: document.getElementById('memberCoach').value.trim(),
        code: document.getElementById('memberCode').value.trim()
    };
    
    // Validate required fields
    if (!member.id || !member.name || !member.date || !member.dob || !member.phone || !member.code) {
        alert('❌ Please fill in all required fields!');
        return;
    }
    
    // Validate code is 4 digits
    if (!/^\d{4}$/.test(member.code)) {
        alert('❌ Member code must be exactly 4 digits!');
        return;
    }
    
    // Get existing members
    let members = JSON.parse(localStorage.getItem('gymMembers') || '[]');
    
    // Check if ID already exists
    if (members.find(m => m.id === member.id)) {
        alert('❌ Member ID already exists!');
        return;
    }
    
    // Add new member
    members.push(member);
    localStorage.setItem('gymMembers', JSON.stringify(members));
    
    // Show success message
    const successMsg = document.getElementById('successMsg');
    successMsg.textContent = '✅ Member added successfully!';
    successMsg.style.display = 'block';
    
    // Reset form
    document.getElementById('memberForm').reset();
    
    // Refresh display
    displayMembers();
    
    // Hide success message after 3 seconds
    setTimeout(() => {
        successMsg.style.display = 'none';
    }, 3000);
});

// Load and display members on page load
document.addEventListener('DOMContentLoaded', function() {
    displayMembers();
});
</script>

</body>
